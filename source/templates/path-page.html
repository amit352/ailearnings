<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}} | AI Learning Hub</title>
  <meta name="description" content="{{DESCRIPTION}}">
  <link rel="canonical" href="{{CANONICAL}}">
  <meta property="og:title" content="{{TITLE}}">
  <meta property="og:description" content="{{DESCRIPTION}}">
  <meta property="og:type" content="article">
  <meta property="og:url" content="{{CANONICAL}}">
  <meta name="twitter:card" content="summary">
  <meta name="robots" content="index, follow">
  <style>{{INLINE_CSS}}</style>
  <style>
    html, body { background-color: #030712 !important; color: #f3f4f6; }
    * { box-sizing: border-box; }
    a { color: inherit; }
    .prose h2 { font-size: 1.5rem; font-weight: 700; color: #f9fafb; margin: 2rem 0 0.75rem; }
    .prose h3 { font-size: 1.125rem; font-weight: 600; color: #e5e7eb; margin: 1.5rem 0 0.5rem; }
    .prose p { color: #d1d5db; line-height: 1.75; margin-bottom: 1rem; }
    .prose ul, .prose ol { color: #d1d5db; padding-left: 1.5rem; margin-bottom: 1rem; }
    .prose li { margin-bottom: 0.375rem; line-height: 1.7; }
    .prose strong { color: #f9fafb; font-weight: 600; }
    .prose a { color: #818cf8; text-decoration: none; }
    .prose a:hover { color: #a5b4fc; text-decoration: underline; }
    .prose code { background: rgba(99,102,241,0.15); color: #a5b4fc; padding: 0.15em 0.4em; border-radius: 4px; font-size: 0.875em; }
    .prose pre { background: #111827; border: 1px solid rgba(255,255,255,0.08); border-radius: 0.5rem; padding: 1.25rem; overflow-x: auto; margin: 1.5rem 0; }
    .prose pre code { background: none; color: #86efac; padding: 0; font-size: 0.85rem; }
    .prose blockquote { border-left: 3px solid #6366f1; padding-left: 1rem; color: #9ca3af; margin: 1.5rem 0; font-style: italic; }
    .prose hr { border-color: rgba(255,255,255,0.08); margin: 2rem 0; }
    .prose table { width: 100%; border-collapse: collapse; margin: 1.5rem 0; font-size: 0.9rem; }
    .prose th { text-align: left; padding: 0.6rem 1rem; background: rgba(99,102,241,0.15); color: #e5e7eb; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .prose td { padding: 0.6rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.06); color: #d1d5db; }
  </style>
  <script type="application/ld+json">{{ARTICLE_SCHEMA}}</script>
  <script type="application/ld+json">{{BREADCRUMB_SCHEMA}}</script>
</head>
<body style="background-color:#030712;color:#f9fafb;font-family:system-ui,sans-serif;margin:0;">

  <!-- Header -->
  <header style="border-bottom:1px solid rgba(255,255,255,0.06);padding:1rem 0;background:#030712;">
    <div style="max-width:64rem;margin:0 auto;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;">
      <a href="/" style="font-weight:700;font-size:1rem;color:#f9fafb;text-decoration:none;">AI Learning Hub</a>
      <nav style="display:flex;gap:1.5rem;font-size:0.8rem;">
        <a href="/" style="color:#9ca3af;text-decoration:none;">Roadmap</a>
        <a href="/blog/" style="color:#9ca3af;text-decoration:none;">Blog</a>
        <a href="/projects/" style="color:#9ca3af;text-decoration:none;">Projects</a>
        <a href="/paths/" style="color:#818cf8;text-decoration:none;font-weight:600;">Learning Paths</a>
      </nav>
    </div>
  </header>

  <!-- Breadcrumbs -->
  <div style="max-width:64rem;margin:0 auto;padding:0.75rem 1.5rem;">
    <nav style="font-size:0.75rem;color:#6b7280;">
      <a href="/" style="color:#6b7280;text-decoration:none;">Home</a>
      <span style="margin:0 0.4rem;">›</span>
      <a href="/paths/" style="color:#6b7280;text-decoration:none;">Learning Paths</a>
      <span style="margin:0 0.4rem;">›</span>
      <span style="color:#9ca3af;">{{TITLE_SHORT}}</span>
    </nav>
  </div>

  <!-- Page Header -->
  <div style="max-width:64rem;margin:0 auto;padding:2rem 1.5rem 1rem;">
    <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:1rem;flex-wrap:wrap;">
      <span style="background:rgba(99,102,241,0.15);color:#818cf8;font-size:0.7rem;font-weight:700;padding:0.25rem 0.75rem;border-radius:9999px;letter-spacing:0.05em;text-transform:uppercase;">Learning Path</span>
      <span style="background:rgba(16,185,129,0.1);color:#34d399;font-size:0.7rem;font-weight:600;padding:0.25rem 0.75rem;border-radius:9999px;">{{TIMELINE}}</span>
      <span style="background:rgba(245,158,11,0.1);color:#fbbf24;font-size:0.7rem;font-weight:600;padding:0.25rem 0.75rem;border-radius:9999px;">{{SALARY}}</span>
    </div>
    <h1 style="font-size:1.875rem;font-weight:800;color:#f9fafb;line-height:1.2;margin:0 0 1rem;">{{TITLE}}</h1>
    <p style="color:#9ca3af;font-size:1rem;line-height:1.6;max-width:42rem;margin:0 0 1.5rem;">{{DESCRIPTION}}</p>
  </div>

  <!-- Content -->
  <main style="max-width:64rem;margin:0 auto;padding:0 1.5rem 4rem;">
    <div class="prose">
      {{CONTENT}}
    </div>
  </main>

  <!-- Footer -->
  <footer style="border-top:1px solid rgba(255,255,255,0.06);padding:2rem 1.5rem;text-align:center;">
    <div style="max-width:64rem;margin:0 auto;">
      <p style="color:#6b7280;font-size:0.8rem;margin:0;">
        <a href="/" style="color:#6b7280;text-decoration:none;margin:0 0.75rem;">Home</a>
        <a href="/blog/" style="color:#6b7280;text-decoration:none;margin:0 0.75rem;">Blog</a>
        <a href="/projects/" style="color:#6b7280;text-decoration:none;margin:0 0.75rem;">Projects</a>
        <a href="/paths/" style="color:#6b7280;text-decoration:none;margin:0 0.75rem;">Paths</a>
      </p>
      <p style="color:#374151;font-size:0.75rem;margin:0.75rem 0 0;">© 2026 AI Learning Hub · ailearnings.in</p>
    </div>
  </footer>

</body>
</html>
