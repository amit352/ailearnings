<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{TITLE}}</title>
  <meta name="description" content="{{DESCRIPTION}}" />
  <link rel="canonical" href="{{CANONICAL}}" />
  <meta property="og:type" content="article" />
  <meta property="og:title" content="{{TITLE}}" />
  <meta property="og:description" content="{{DESCRIPTION}}" />
  <meta property="og:url" content="{{CANONICAL}}" />
  <meta property="og:site_name" content="AI Learning Hub" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="{{TITLE}}" />
  <meta name="twitter:description" content="{{DESCRIPTION}}" />
  <style>{{INLINE_CSS}}</style>
  <style>
    html, body { background-color: #030712 !important; color: #f3f4f6; }
    * { box-sizing: border-box; }
    a { color: inherit; }
    header { background-color: rgba(17,24,39,0.7); border-bottom: 1px solid rgba(255,255,255,0.08); }
    footer { border-top: 1px solid rgba(255,255,255,0.08); background-color: rgba(3,7,18,0.8); }
    .prose h2 { font-size: 1.5rem; font-weight: 700; color: #f9fafb; margin: 2rem 0 0.75rem; }
    .prose h3 { font-size: 1.125rem; font-weight: 600; color: #e5e7eb; margin: 1.5rem 0 0.5rem; }
    .prose p { color: #d1d5db; line-height: 1.75; margin-bottom: 1rem; }
    .prose ul, .prose ol { color: #d1d5db; padding-left: 1.5rem; margin-bottom: 1rem; }
    .prose li { margin-bottom: 0.375rem; line-height: 1.7; }
    .prose strong { color: #f9fafb; font-weight: 600; }
    .prose a { color: #818cf8; text-decoration: none; }
    .prose a:hover { color: #a5b4fc; text-decoration: underline; }
    .prose code { background: rgba(99,102,241,0.15); color: #a5b4fc; padding: 0.15em 0.4em; border-radius: 4px; font-size: 0.875em; }
    .prose pre { background: #111827; border: 1px solid rgba(255,255,255,0.08); border-radius: 0.5rem; padding: 1.25rem; overflow-x: auto; margin: 1.5rem 0; }
    .prose pre code { background: none; color: #86efac; padding: 0; font-size: 0.85rem; }
    .prose blockquote { border-left: 3px solid #6366f1; padding-left: 1rem; color: #9ca3af; margin: 1.5rem 0; font-style: italic; }
    .prose hr { border-color: rgba(255,255,255,0.08); margin: 2rem 0; }
    .prose table { width: 100%; border-collapse: collapse; margin: 1.5rem 0; font-size: 0.9rem; }
    .prose th { text-align: left; padding: 0.6rem 1rem; background: rgba(99,102,241,0.15); color: #e5e7eb; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .prose td { padding: 0.6rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.06); color: #d1d5db; }
  </style>
  <script type="application/ld+json">
{{ARTICLE_SCHEMA}}
  </script>
  <script type="application/ld+json">
{{BREADCRUMB_SCHEMA}}
  </script>
</head>
<body class="text-gray-100 font-sans" style="background-color:#030712;min-height:100vh;">

  <!-- Header -->
  <header class="sticky top-0 z-50 bg-gray-900/70 backdrop-blur-md border-b border-white/8">
    <div class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="/" class="text-white font-semibold text-sm hover:text-blue-400 transition-colors">AI Learning Hub</a>
      <nav class="flex items-center gap-3 text-xs">
        <a href="/" class="text-gray-400 hover:text-white transition-colors">Roadmap</a>
        <a href="/blog/" class="text-white font-semibold">Blog</a>
        <a href="/projects/" class="text-gray-400 hover:text-white transition-colors">Projects</a>
        <a href="/paths/" class="text-gray-400 hover:text-white transition-colors">Paths</a>
      </nav>
    </div>
  </header>

  <!-- Breadcrumbs -->
  <div class="max-w-3xl mx-auto px-4 pt-5 pb-2">
    <nav class="flex items-center gap-2 text-xs text-gray-500" aria-label="Breadcrumb">
      <a href="/" class="hover:text-gray-300 transition-colors">Home</a>
      <span>›</span>
      <a href="/blog/" class="hover:text-gray-300 transition-colors">Blog</a>
      <span>›</span>
      <span class="text-gray-400">{{TITLE_SHORT}}</span>
    </nav>
  </div>

  <!-- Article -->
  <main class="max-w-3xl mx-auto px-4 py-8">
    <article>
      <header class="mb-8">
        <h1 class="text-3xl font-bold text-white mb-3 leading-tight">{{TITLE}}</h1>
        <div class="flex items-center gap-4 text-sm text-gray-400">
          <time datetime="{{DATE}}">{{DATE_DISPLAY}}</time>
          <span>·</span>
          <span>{{READ_TIME}} min read</span>
          <span>·</span>
          <span>AI Learning Hub</span>
        </div>
      </header>

      <div class="prose">
        {{CONTENT}}
      </div>
    </article>

    <!-- Back link -->
    <div class="mt-12 pt-8 border-t border-white/8">
      <a href="/blog/" class="text-blue-400 hover:text-blue-300 text-sm transition-colors">← Back to all articles</a>
    </div>
  </main>

  <!-- Footer -->
  <footer class="border-t border-white/8 mt-8" style="background-color:rgba(3,7,18,0.8);">
    <div class="max-w-3xl mx-auto px-4 py-8 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
      <div>
        <p class="text-white font-semibold text-sm mb-1">ailearnings.in</p>
        <p class="text-gray-400 text-xs">Free AI roadmap for software developers</p>
      </div>
      <div class="flex flex-wrap gap-4 text-xs text-gray-400">
        <a href="/" class="hover:text-white transition-colors">Roadmap</a>
        <a href="/resources/" class="hover:text-white transition-colors">Resources</a>
        <a href="/prompt-eng/" class="hover:text-white transition-colors">Prompt Eng</a>
        <a href="/blog/" class="hover:text-white transition-colors">Blog</a>
      </div>
    </div>
  </footer>


</body>
</html>
