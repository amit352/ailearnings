<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="canonical" href="https://ailearnings.in/blog/" />
  <meta property="og:type" content="website" />

  <style>{{INLINE_CSS}}</style>
  <style>
    html, body { background-color: #030712 !important; color: #f3f4f6; }

  <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Blog",

  "description": "AI engineering articles, tutorials, and roadmaps for software developers learning LLMs, RAG, and agentic AI.",

<body class="text-gray-100 font-sans" style="background-color:#030712;min-height:100vh;">

  <!-- Header -->
  <header class="sticky top-0 z-50 bg-gray-900/70 backdrop-blur-md border-b border-white/8">
    <div class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">

      <p class="text-gray-400 text-lg">Practical guides and tutorials for developers learning AI — LLMs, RAG, prompt engineering, machine learning, and agentic AI.</p>

{{POST_LIST}}
