name: Build & Deploy

on:
  push:
    branches: [main, static-site-migration]
    paths:
      - 'source/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: source/package-lock.json

      - name: Install dependencies
        working-directory: source
        run: npm ci

      - name: Build
        working-directory: source
        run: npm run build

      - name: Commit built files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html dist/ \
            prep-plan/index.html \
            genai-guide/index.html \
            prompt-eng/index.html \
            resources/index.html \
            readiness/index.html \
            beyond-roadmap/index.html \
            assessment/index.html
          git diff --cached --quiet || git commit -m "build: auto-compile from source [skip ci]"
          git push
